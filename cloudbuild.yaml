steps:
  # Build Docker image (the Dockerfile installs deps via `npm ci` on node:22-alpine,
  # matching the lockfile — no redundant top-level install on a mismatched node:latest).
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/graffiticode/l0013:$COMMIT_SHA'
      - '.'

  # Push image to Container Registry
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - 'gcr.io/graffiticode/l0013:$COMMIT_SHA'
    id: Push

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    args:
      - run
      - deploy
      - l0013
      - '--platform=managed'
      - '--image=gcr.io/graffiticode/l0013:$COMMIT_SHA'
      - >-
        --labels=commit-sha=$COMMIT_SHA,gcb-build-id=$BUILD_ID,gcb-trigger-id=$_TRIGGER_ID
      - '--region=$_DEPLOY_REGION'
      - '--quiet'
      - '--set-env-vars=AUTH_URL=$_AUTH_URL'
      - '--allow-unauthenticated'
      # Headless Chrome (the `snap` render) needs more memory/CPU than a plain lang server, and
      # each request launches its own browser — so keep concurrency low to avoid OOM.
      - '--memory=2Gi'
      - '--cpu=2'
      - '--concurrency=4'
      - '--timeout=300'
      # Keep one instance warm: a cold start pays ~6-7s of headless-Chrome launch on top of the
      # render, so the first snap after idle was ~15-20s. min-instances=1 removes that first-hit.
      - '--min-instances=1'
    id: Deploy
    entrypoint: gcloud

images:
  - 'gcr.io/graffiticode/l0013:$COMMIT_SHA'

options:
  substitutionOption: ALLOW_LOOSE

substitutions:
  _DEPLOY_REGION: us-central1
  _AUTH_URL: https://auth.graffiticode.org

tags:
  - l0013